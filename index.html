<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרדיו שלי</title>
    <style>
        /* ביטול שוליים לבנים והשתלטות צבע השמנת על כל המסך */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: #fdfbf7; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* אזור הלוגו העליון שמתפרש על כל הרוחב ונמס לתוך הרקע */
        .header-bg {
            width: 100%;
            max-width: 600px; 
            position: relative;
            line-height: 0;
        }

        .header-bg img {
            width: 100%;
            height: auto;
            display: block;
        }

        .header-bg::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px; 
            background: linear-gradient(to bottom, rgba(253, 251, 247, 0) 0%, #fdfbf7 100%);
        }

        /* מיכל התוכן הראשי */
        .container {
            max-width: 550px;
            width: 95%; 
            text-align: center;
            margin-top: -10px; 
            z-index: 2;
            padding-bottom: 40px;
        }

        /* עיצוב אזור הנגן המרכזי */
        .now-playing {
            background: #fffcf7;
            padding: 20px 15px; 
            border-radius: 12px;
            margin-bottom: 30px;
            border: 2px solid #800020;
            box-shadow: 0 4px 15px rgba(74, 14, 23, 0.05);
            overflow: hidden;
        }

        .now-playing h2 {
            font-size: 18px;
            margin-top: 0;
            color: #800020;
            margin-bottom: 15px;
        }

        /* מיכל הנגן של גוגל דרייב */
        .drive-player-container {
            position: relative;
            width: 100%;
            height: 62px; 
            border-radius: 31px;
            overflow: hidden;
            border: 1px solid #eadecc;
            background: #f1f3f4;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* עיצוב רשימת הפרקים */
        .playlist {
            text-align: right;
            padding: 0 5px;
        }

        .playlist h3 {
            font-size: 16px;
            color: #800020;
            border-bottom: 2px solid #800020;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .track-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fffcf7;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid #eadecc;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .track-item:hover {
            background: #f5efe2;
            border-color: #800020;
        }

        .track-title {
            font-weight: bold;
            font-size: 15px;
            color: #4a0e17;
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 4px;
        }

        .track-date {
            font-size: 12px;
            color: #8a766a;
        }

        .listened-tag {
            font-size: 11px;
            color: #2e7d32; 
            background-color: #e8f5e9;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            display: none; 
        }

        .play-btn {
            background: #800020;
            color: #fdfbf7;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }

        /* פתרון אגרסיבי למסכים צרים של טלפונים ניידים */
        @media (max-width: 480px) {
            .container {
                width: 100%; /* מריחה מלאה של התוכן מקצה לקצה */
            }
            .now-playing {
                border-left: none;
                border-right: none;
                border-radius: 0; /* ביטול הקיעור בצדדים כדי להרוויח עוד פיקסלים */
                padding: 20px 2px;
            }
            .drive-player-container {
                width: 108%; /* מותח את גבולות המיכל החוצה */
                left: -4%; /* מאזן את המתיחה למרכז המסך */
                transform: scale(0.92); /* מקטין את הנגן והכפתורים בצורה אחידה כדי שלא יימחצו */
            }
            .playlist {
                padding: 0 12px; /* שומר על מרחק יפה לרשימת השירים */
            }
        }
    </style>
</head>
<body>

    <div class="header-bg">
        <img src="logo.jpg" alt="רדיו שיר לוגו">
    </div>

    <div class="container">
        
        <div class="now-playing">
            <h2 id="current-title">טוען את הפרק האחרון...</h2>
            
            <div class="drive-player-container">
                <iframe id="drive-player" src="" allow="autoplay"></iframe>
            </div>
        </div>

        <div class="playlist" id="playlist-container">
            <h3>פרקים נוספים:</h3>
            
            <div class="track-item" data-id="1WutDUMIWzXUVzWbL_N1nyfGbvC2XB5kM" data-title="פרק 4" data-date="2026-07-02" onclick="clickTrack(this)">
                <div>
                    <div class="track-title">פרק 4</div>
                    <div class="track-info">
                        <span class="track-date">מחשב זמן...</span>
                        <span class="listened-tag">האזנת</span>
                    </div>
                </div>
                <button class="play-btn">נגן</button>
            </div>

            <div class="track-item" data-id="1Q9jhmXlZSUFJfS1Oezrd-m41mbujpLfd" data-title="פרק 3" data-date="2026-06-30" onclick="clickTrack(this)">
                <div>
                    <div class="track-title">פרק 3</div>
                    <div class="track-info">
                        <span class="track-date">מחשב זמן...</span>
                        <span class="listened-tag">האזנת</span>
                    </div>
                </div>
                <button class="play-btn">נגן</button>
            </div>

            <div class="track-item" data-id="17R9l566A0xpfwHqQOL7WiYpAFUeVFdnM" data-title="פרק 2" data-date="2026-06-27" onclick="clickTrack(this)">
                <div>
                    <div class="track-title">פרק 2</div>
                    <div class="track-info">
                        <span class="track-date">מחשב זמן...</span>
                        <span class="listened-tag">האזנת</span>
                    </div>
                </div>
                <button class="play-btn">נגן</button>
            </div>

            <div class="track-item" data-id="1cxid22jFkAsHGNMeqNBs27aCCoVKZZu6" data-title="פרק 1" data-date="2026-06-23" onclick="clickTrack(this)">
                <div>
                    <div class="track-title">פרק 1</div>
                    <div class="track-info">
                        <span class="track-date">מחשב זמן...</span>
                        <span class="listened-tag">האזנת</span>
                    </div>
                </div>
                <button class="play-btn">נגן</button>
            </div>

        </div>
    </div>

    <script>
        function updateTrackDates() {
            const tracks = document.querySelectorAll('.track-item');
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

            tracks.forEach(track => {
                const dateStr = track.getAttribute('data-date');
                if (!dateStr) return;

                const parts = dateStr.split('-');
                const uploadDate = new Date(parts[0], parts[1] - 1, parts[2]);

                const timeDiff = today.getTime() - uploadDate.getTime();
                const daysDiff = Math.floor(timeDiff / (1000 * 60 * 60 * 24));

                let statusText = "";

                if (daysDiff <= 0) {
                    statusText = "הועלה היום";
                } else if (daysDiff === 1) {
                    statusText = "הועלה אתמול";
                } else if (daysDiff <= 14) {
                    statusText = "הועלה לפני " + daysDiff + " ימים";
                } else {
                    const monthsDiff = Math.floor(daysDiff / 30);
                    if (monthsDiff <= 1) {
                        statusText = "הועלה לפני חודש";
                    } else {
                        statusText = "הועלה לפני " + monthsDiff + " חודשים";
                    }
                }

                track.querySelector('.track-date').innerText = statusText;
            });
        }

        function loadTrack(driveId, title) {
            const player = document.getElementById('drive-player');
            const titleElement = document.getElementById('current-title');

            player.src = "https://drive.google.com/file/d/" + driveId + "/preview";
            titleElement.innerText = "מתנגן כעת: " + title;
        }

        function clickTrack(element) {
            const driveId = element.getAttribute('data-id');
            const title = element.getAttribute('data-title');
            
            loadTrack(driveId, title);
            
            localStorage.setItem('listened-' + title, 'true');
            element.querySelector('.listened-tag').style.display = 'inline-block';
        }

        window.onload = function() {
            updateTrackDates();

            const tracks = document.querySelectorAll('.track-item');
            tracks.forEach(track => {
                const title = track.getAttribute('data-title');
                if (localStorage.getItem('listened-' + title) === 'true') {
                    track.querySelector('.listened-tag').style.display = 'inline-block';
                }
            });

            const firstTrack = document.querySelector('.track-item');
            if (firstTrack) {
                const firstId = firstTrack.getAttribute('data-id');
                const firstTitle = firstTrack.getAttribute('data-title');
                loadTrack(firstId, firstTitle);
            }
        };
    </script>

</body>
</html>
