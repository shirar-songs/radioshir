<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרדיו שלי</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* הגדרת פונט ההנצחה המיוחד 'OH Tamir Adar' מתוך קבצי ה-Web שהעלית */
        @font-face {
            font-family: 'OHTamirAdar';
            src: url('OHTamirAdar-Regular.woff2') format('woff2'),
                 url('OHTamirAdar-Regular.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        /* ביטול שוליים והגדרת רקע שמנת קבוע לכל העמוד */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: #fcf9f2; 
            font-family: 'Assistant', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* אזור הלוגו העליון - עוטף את הנגן והכותרת */
        .header-bg {
            width: 100%;
            max-width: 600px; 
            position: relative;
            background-image: url('logo.jpg');
            background-size: 100% auto;
            background-position: center top;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 180px; 
        }

        /* אפקט המיזוג החלק של התמונה אל תוך השמנת בתחתית אזור הלוגו */
        .header-bg::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 90px; 
            background: linear-gradient(to bottom, rgba(252, 249, 242, 0) 0%, #fcf9f2 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* מיכל התוכן הראשי */
        .container {
            width: 100%; 
            max-width: 540px;
            text-align: center;
            z-index: 2; 
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            padding: 0 10px;
        }

        /* אזור הנגן המרכזי */
        .now-playing {
            background: transparent;
            padding: 10px 0;
            margin-bottom: 20px;
            border: none;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .now-playing h2 {
            font-size: 20px;
            margin-top: 0;
            color: #800020;
            margin-bottom: 15px;
            font-weight: 700;
            text-shadow: 1px 1px 3px rgba(252, 249, 242, 0.9);
        }

        /* מיכל הנגן של גוגל דרייב */
        .drive-player-container {
            position: relative;
            width: 100%;
            max-width: 440px; 
            height: 62px; 
            border-radius: 31px;
            overflow: hidden;
            border: 1px solid #eadecc;
            background: #f1f3f4;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            box-sizing: border-box;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* עיצוב רשימת הפרקים - יושבת בחוץ על רקע השמנת */
        .playlist-wrapper {
            width: 90%;
            max-width: 500px;
            z-index: 3;
            padding-bottom: 40px;
        }

        .playlist {
            text-align: right;
            padding: 0 2px;
        }

        /* כותרת הפרקים הנוספים */
        .playlist h3 {
            font-size: 18px;
            color: #800020;
            border-bottom: 2px solid #800020;
            padding-bottom: 8px;
            margin-top: 10px;
            margin-bottom: 20px;
            font-weight: 700;
            text-shadow: 1px 1px 3px rgba(252, 249, 242, 0.9);
        }

        /* כרטיסיות הפרקים */
        .track-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fffcf7;
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 12px;
            cursor: pointer;
            border: 1px solid #ebdcc5;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(128,0,32,0.02);
        }

        .track-item:hover {
            background: #f5efe2;
            border-color: #800020;
        }

        .track-title {
            font-weight: 700;
            font-size: 16px;
            color: #4a0e17;
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }

        .track-date {
            font-size: 13px;
            color: #8a766a;
        }

        .listened-tag {
            font-size: 11px;
            color: #2e7d32; 
            background-color: #e8f5e9;
            padding: 2px 7px;
            border-radius: 4px;
            font-weight: 700;
            display: none; 
        }

        /* כפתור נגן - משתמש בלעדית בפונט OHTamirAdar שהעלית */
        .play-btn {
            background: #800020;
            color: #fdfbf7;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            font-weight: normal;
            font-size: 17px; /* הגדלה קלה של הגופן כדי שיהיה קריא ובולט כמו שצריך */
            cursor: pointer;
            font-family: 'OHTamirAdar', sans-serif; /* הגדרת הפונט המיוחד */
            line-height: 1;
        }

        /* התאמות מדויקות למסכים ומניעת עלייה של כפתורים זה על זה בנייד */
        @media (max-width: 450px) {
            .header-bg {
                padding-top: 140px; 
            }
            .drive-player-container {
                width: 100%; 
            }
        }
    </style>
</head>
<body>

    <div class="header-bg">
        <div class="container">
            <div class="now-playing">
                <h2 id="current-title">טוען את הפרק האחרון...</h2>
                <div class="drive-player-container">
                    <iframe id="drive-player" src="" allow="autoplay"></iframe>
                </div>
            </div>

            <div class="playlist">
                <h3>פרקים נוספים:</h3>
            </div>
        </div>
    </div>

    <div class="playlist-wrapper">
        <div class="playlist" id="playlist-container">
            
            <div class="track-item" data-id="1WutDUMIWzXUVzWbL_N1nyfGbvC2XB5kM" data-title="פרק 4" data-date="2026-07-02" onclick="clickTrack(this)">
                <div>
                    <div class="track-title">פרק 4</div>
                    <div class="track-info">
                        <span class="track-date">מחשב זמן...</span>
                        <span class="listened-tag">האזנת</span>
                    </div>
                </div>
                <button class="play-btn">נגן</button>
            </div>

            <div class="track-item" data-id="1Q9jhmXlZSUFJfS1Oezrd-m41mbujpLfd" data-title="פרק 3" data-date="2026-06-30" onclick="clickTrack(this)">
                <div>
                    <div class="track-title">פרק 3</div>
                    <div class="track-info">
                        <span class="track-date">מחשב זמן...</span>
                        <span class="listened-tag">האזנת</span>
                    </div>
                </div>
                <button class="play-btn">נגן</button>
            </div>

            <div class="track-item" data-id="17R9l566A0xpfwHqQOL7WiYpAFUeVFdnM" data-title="פרק 2" data-date="2026-06-27" onclick="clickTrack(this)">
                <div>
                    <div class="track-title">פרק 2</div>
                    <div class="track-info">
                        <span class="track-date">מחשב זמן...</span>
                        <span class="listened-tag">האזנת</span>
                    </div>
                </div>
                <button class="play-btn">נגן</button>
            </div>

            <div class="track-item" data-id="1cxid22jFkAsHGNMeqNBs27aCCoVKZZu6" data-title="פרק 1" data-date="2026-06-23" onclick="clickTrack(this)">
                <div>
                    <div class="track-title">פרק 1</div>
                    <div class="track-info">
                        <span class="track-date">מחשב זמן...</span>
                        <span class="listened-tag">האזנת</span>
                    </div>
                </div>
                <button class="play-btn">נגן</button>
            </div>

        </div>
    </div>

    <script>
        function updateTrackDates() {
            const tracks = document.querySelectorAll('.track-item');
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

            tracks.forEach(track => {
                const dateStr = track.getAttribute('data-date');
                if (!dateStr) return;

                const parts = dateStr.split('-');
                const uploadDate = new Date(parts[0], parts[1] - 1, parts[2]);

                const timeDiff = today.getTime() - uploadDate.getTime();
                const daysDiff = Math.floor(timeDiff / (1000 * 60 * 60 * 24));

                let statusText = "";

                if (daysDiff <= 0) {
                    statusText = "הועלה היום";
                } else if (daysDiff === 1) {
                    statusText = "הועלה אתמול";
                } else if (daysDiff <= 14) {
                    statusText = "הועלה לפני " + daysDiff + " ימים";
                } else {
                    const monthsDiff = Math.floor(daysDiff / 30);
                    if (monthsDiff <= 1) {
                        statusText = "הועלה לפני חודש";
                    } else {
                        statusText = "הועלה לפני " + monthsDiff + " חודשים";
                    }
                }

                track.querySelector('.track-date').innerText = statusText;
            });
        }

        function loadTrack(driveId, title) {
            const player = document.getElementById('drive-player');
            const titleElement = document.getElementById('current-title');

            player.src = "https://drive.google.com/file/d/" + driveId + "/preview";
            titleElement.innerText = "מתנגן כעת: " + title;
        }

        function clickTrack(element) {
            const driveId = element.getAttribute('data-id');
            const title = element.getAttribute('data-title');
            
            loadTrack(driveId, title);
            
            localStorage.setItem('listened-' + title, 'true');
            element.querySelector('.listened-tag').style.display = 'inline-block';
        }

        window.onload = function() {
            updateTrackDates();

            const tracks = document.querySelectorAll('.track-item');
            tracks.forEach(track => {
                const title = track.getAttribute('data-title');
                if (localStorage.getItem('listened-' + title) === 'true') {
                    track.querySelector('.listened-tag').style.display = 'inline-block';
                }
            });

            const firstTrack = document.querySelector('.track-item');
            if (firstTrack) {
                const firstId = firstTrack.getAttribute('data-id');
                const firstTitle = firstTrack.getAttribute('data-title');
                loadTrack(firstId, firstTitle);
            }
        };
    </script>

</body>
</html>
