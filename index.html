<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרדיו שלי</title>
    <style>
        /* הגדרת תמונת הלוגו כרקע קבוע שמשתלט על כל המסך בצורה חלקה */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-image: url('logo.jpg');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            background-attachment: fixed; /* שומר על הרקע יציב כשיורדים בפרקים */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* מרווח עליון בלבד כדי לתת כבוד לחלק העליון של התמונה (איפה שהכיתוב "רדיו שיר") */
        .header-spacer {
            width: 100%;
            height: 220px; /* גובה משוער כדי שהטקסט והנגן לא יסתירו את הלוגו הראשי */
        }

        /* מיכל התוכן הראשי */
        .container {
            max-width: 500px;
            width: 90%; 
            text-align: center;
            z-index: 2;
            padding-bottom: 40px;
        }

        /* אזור הנגן המרכזי - נקי לחלוטין, צף ישירות על תמונת הרקע */
        .now-playing {
            background: transparent;
            padding: 10px 0;
            margin-bottom: 35px;
            border: none;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .now-playing h2 {
            font-size: 19px;
            margin-top: 0;
            color: #800020;
            margin-bottom: 18px;
            font-weight: bold;
            /* צל קליל לטקסט כדי שיבלוט בצורה מושלמת על גבי הנוף */
            text-shadow: 1px 1px 2px rgba(253, 251, 247, 0.8);
        }

        /* מיכל הנגן של גוגל דרייב - ממורכז ויציב */
        .drive-player-container {
            position: relative;
            width: 100%;
            max-width: 380px; 
            height: 62px; 
            border-radius: 31px;
            overflow: hidden;
            border: 1px solid #eadecc;
            background: #f1f3f4;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* עיצוב רשימת הפרקים */
        .playlist {
            text-align: right;
            padding: 0 2px;
        }

        .playlist h3 {
            font-size: 16px;
            color: #800020;
            border-bottom: 2px solid #800020;
            padding-bottom: 8px;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(253, 251, 247, 0.8);
        }

        /* כרטיסיות הפרקים - עם רקע מעט שקוף כדי שיראו את הנוף מאחור בעדינות */
        .track-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 252, 247, 0.9); /* שקיפות עדינה למראה יוקרתי */
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid #eadecc;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .track-item:hover {
            background: rgba(245, 239, 226, 0.95);
            border-color: #800020;
        }

        .track-title {
            font-weight: bold;
            font-size: 15px;
            color: #4a0e17;
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 4px;
        }

        .track-date {
            font-size: 12px;
            color: #8a766a;
        }

        .listened-tag {
            font-size: 11px;
            color: #2e7d32; 
            background-color: #e8f5e9;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            display: none; 
        }

        .play-btn {
            background: #800020;
            color: #fdfbf7;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }

        /* התאמות למסכים קטנים מאוד */
        @media (max-width: 400px) {
            .drive-player-container {
                max-width: 100%;
            }
            .header-spacer {
                height: 180px; /* התאמת המרווח העליון לטלפונים קטנים */
            }
        }
    </style>
</head>
<body>

    <div class="header-spacer"></div>

    <div class="container">
        
        <div class="now-playing">
            <h2 id="current-title">טוען את הפרק האחרון...</h2>
            
            <div class="drive-player-container">
                <iframe id="drive-player" src="" allow="autoplay"></iframe>
            </div>
        </div>

        <div class="playlist" id="playlist-container">
            <h3>פרקים נוספים:</h3>
            
            <div class="track-item" data-id="1WutDUMIWzXUVzWbL_N1nyfGbvC2XB5kM" data-title="פרק 4" data-date="2026-07-02" onclick="clickTrack(this)">
                <div>
                    <div class="track-title">פרק 4</div>
                    <div class="track-info">
                        <span class="track-date">מחשב זמן...</span>
                        <span class="listened-tag">האזנת</span>
                    </div>
                </div>
                <button class="play-btn">נגן</button>
            </div>

            <div class="track-item" data-id="1Q9jhmXlZSUFJfS1Oezrd-m41mbujpLfd" data-title="פרק 3" data-date="2026-06-30" onclick="clickTrack(this)">
                <div>
                    <div class="track-title">פרק 3</div>
                    <div class="track-info">
                        <span class="track-date">מחשב זמן...</span>
                        <span class="listened-tag">האזנת</span>
                    </div>
                </div>
                <button class="play-btn">נגן</button>
            </div>

            <div class="track-item" data-id="17R9l566A0xpfwHqQOL7WiYpAFUeVFdnM" data-title="פרק 2" data-date="2026-06-27" onclick="clickTrack(this)">
                <div>
                    <div class="track-title">פרק 2</div>
                    <div class="track-info">
                        <span class="track-date">מחשב זמן...</span>
                        <span class="listened-tag">האזנת</span>
                    </div>
                </div>
                <button class="play-btn">נגן</button>
            </div>

            <div class="track-item" data-id="1cxid22jFkAsHGNMeqNBs27aCCoVKZZu6" data-title="פרק 1" data-date="2026-06-23" onclick="clickTrack(this)">
                <div>
                    <div class="track-title">פרק 1</div>
                    <div class="track-info">
                        <span class="track-date">מחשב זמן...</span>
                        <span class="listened-tag">האזנת</span>
                    </div>
                </div>
                <button class="play-btn">נגן</button>
            </div>

        </div>
    </div>

    <script>
        function updateTrackDates() {
            const tracks = document.querySelectorAll('.track-item');
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

            tracks.forEach(track => {
                const dateStr = track.getAttribute('data-date');
                if (!dateStr) return;

                const parts = dateStr.split('-');
                const uploadDate = new Date(parts[0], parts[1] - 1, parts[2]);

                const timeDiff = today.getTime() - uploadDate.getTime();
                const daysDiff = Math.floor(timeDiff / (1000 * 60 * 60 * 24));

                let statusText = "";

                if (daysDiff <= 0) {
                    statusText = "הועלה היום";
                } else if (daysDiff === 1) {
                    statusText = "הועלה אתמול";
                } else if (daysDiff <= 14) {
                    statusText = "הועלה לפני " + daysDiff + " ימים";
                } else {
                    const monthsDiff = Math.floor(daysDiff / 30);
                    if (monthsDiff <= 1) {
                        statusText = "הועלה לפני חודש";
                    } else {
                        statusText = "הועלה לפני " + monthsDiff + " חודשים";
                    }
                }

                track.querySelector('.track-date').innerText = statusText;
            });
        }

        function loadTrack(driveId, title) {
            const player = document.getElementById('drive-player');
            const titleElement = document.getElementById('current-title');

            player.src = "https://drive.google.com/file/d/" + driveId + "/preview";
            titleElement.innerText = "מתנגן כעת: " + title;
        }

        function clickTrack(element) {
            const driveId = element.getAttribute('data-id');
            const title = element.getAttribute('data-title');
            
            loadTrack(driveId, title);
            
            localStorage.setItem('listened-' + title, 'true');
            element.querySelector('.listened-tag').style.display = 'inline-block';
        }

        window.onload = function() {
            updateTrackDates();

            const tracks = document.querySelectorAll('.track-item');
            tracks.forEach(track => {
                const title = track.getAttribute('data-title');
                if (localStorage.getItem('listened-' + title) === 'true') {
                    track.querySelector('.listened-tag').style.display = 'inline-block';
                }
            });

            const firstTrack = document.querySelector('.track-item');
            if (firstTrack) {
                const firstId = firstTrack.getAttribute('data-id');
                const firstTitle = firstTrack.getAttribute('data-title');
                loadTrack(firstId, firstTitle);
            }
        };
    </script>

</body>
</html>
