<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרדיו שלי</title>
    <style>
        /* עיצוב כללי של הדף - גווני שמנת ובורדו */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdfbf7; 
            color: #4a0e17; 
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
            background: #f7f3e9; 
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(74, 14, 23, 0.1);
            margin-top: 20px;
            border: 1px solid #eadecc;
        }

        /* מיקום הלוגו שלך */
        .logo-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-placeholder {
            width: 150px;
            height: 150px;
            background-color: #eadecc;
            border: 2px dashed #800020;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #800020;
            font-weight: bold;
            font-size: 14px;
        }

        .subtitle {
            color: #6b5b52;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* עיצוב אזור הנגן המוטמע של גוגל */
        .now-playing {
            background: #fffcf7;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 2px solid #800020;
        }

        .now-playing h2 {
            font-size: 18px;
            margin-top: 0;
            color: #800020;
            margin-bottom: 15px;
        }

        /* מסגרת הנגן של גוגל דרייב */
        .drive-player-container {
            position: relative;
            width: 100%;
            height: 60px;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid #eadecc;
            background: #f1f3f4;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* עיצוב רשימת הפרקים */
        .playlist {
            text-align: right;
        }

        .playlist h3 {
            font-size: 16px;
            color: #800020;
            border-bottom: 2px solid #800020;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .track-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fffcf7;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid #eadecc;
            transition: all 0.2s;
        }

        .track-item:hover {
            background: #f5efe2;
            border-color: #800020;
        }

        .track-title {
            font-weight: bold;
            font-size: 15px;
            color: #4a0e17;
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 4px;
        }

        .track-date {
            font-size: 12px;
            color: #8a766a;
        }

        .listened-tag {
            font-size: 11px;
            color: #2e7d32; 
            background-color: #e8f5e9;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            display: none; 
        }

        .play-btn {
            background: #800020;
            color: #fdfbf7;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="logo-container">
            <div class="logo-placeholder">מקום ללוגו שלך</div>
        </div>

        <div class="subtitle">תוכנית שמע חדשה כל 3 ימים לדרך ולנסיעות</div>

        <div class="now-playing">
            <h2 id="current-title">מתנגן כעת: פרק 1</h2>
            
            <div class="drive-player-container">
                <iframe id="drive-player" src="https://drive.google.com/file/d/1cxid22jFkAsHGNMeqNBs27aCCoVKZZu6/preview"></iframe>
            </div>
        </div>

        <div class="playlist">
            <h3>פרקים נוספים:</h3>
            
            <div class="track-item" id="track-episode1" onclick="changeTrack('1cxid22jFkAsHGNMeqNBs27aCCoVKZZu6', 'פרק 1')">
                <div>
                    <div class="track-title">פרק 1</div>
                    <div class="track-info">
                        <span class="track-date">הועלה היום</span>
                        <span class="listened-tag" id="tag-episode1">האזנת</span>
                    </div>
                </div>
                <button class="play-btn">נגן</button>
            </div>

        </div>
    </div>

    <script>
        function changeTrack(driveId, title) {
            const player = document.getElementById('drive-player');
            const titleElement = document.getElementById('current-title');

            // עדכון הנגן של גוגל לפרק הנבחר
            player.src = "https://drive.google.com/file/d/" + driveId + "/preview";
            titleElement.innerText = "מתנגן כעת: " + title;

            markAsListened();
        }

        function markAsListened() {
            localStorage.setItem('listened-episode1', 'true');
            const tag = document.getElementById('tag-episode1');
            if (tag) {
                tag.style.display = 'inline-block';
            }
        }

        function checkHistory() {
            if (localStorage.getItem('listened-episode1') === 'true') {
                const tag = document.getElementById('tag-episode1');
                if (tag) {
                    tag.style.display = 'inline-block';
                }
            }
        }

        window.onload = checkHistory;
    </script>

</body>
</html>
